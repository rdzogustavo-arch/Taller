<!doctype html>
<html lang="es" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Galería del taller: Inspírate, escribe y transforma tu voz en arte con IA</title>

  <style>
    :root {
      --bg: #0f0f12;
      --fg: #f2f2f2;
      --muted: #a8a8aa;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #ffffff; --fg: #111111; --muted: #6b7280; }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
                   Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Contenedor general: mobile-first (llena la pantalla) */
    .wrap {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.75rem;
      padding: env(safe-area-inset-top) clamp(12px, 3vw, 20px) clamp(12px, 3vw, 20px);
    }

    header h1 {
      margin: 0;
      font-weight: 700;
      font-size: clamp(1.1rem, 4.5vw, 1.75rem);
      letter-spacing: 0.2px;
    }

    header p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: clamp(0.85rem, 3.5vw, 1rem);
    }

    /* Marco responsivo del iframe */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;      /* en móvil: ocupa todo el alto disponible */
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 10px 30px rgba(0,0,0,.25),
        0 1px 2px rgba(0,0,0,.2);
      background: #000;
      border: 1px solid color-mix(in oklab, var(--fg), transparent 85%);
    }

    /* En pantallas medianas/grandes, usa 16:9 y centra con márgenes */
    @media (min-width: 640px) {
      .wrap {
        padding: clamp(16px, 3.5vw, 28px);
      }
      .frame {
        /* Mantén proporción 16:9 sin perder responsividad */
        height: auto;
        aspect-ratio: 16 / 9;
        margin-inline: auto;
        max-width: 1200px;
      }
    }

    .frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Accesibilidad: foco visible si se navega con teclado */
    .frame:focus-within {
      outline: 3px solid color-mix(in oklab, var(--fg), transparent 70%);
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Galería del taller: Inspírate, escribe y transforma tu voz en arte con IA</h1>
      <p aria-hidden="true">Experiencia inmersiva — mejor en pantalla completa.</p>
    </header>

    <div class="frame" role="region" aria-label="Galería virtual del taller">
      <!-- El width/height del atributo quedan sobrescritos por CSS para ser 100% responsivo -->
      <iframe
        title="Galería virtual del taller en Artsteps"
        width="1280"
        height="720"
        src="https://www.artsteps.com/embed/68a4ea3b3f2665701030ff8e/1280/720"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>
</body>
</html>
